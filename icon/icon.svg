<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Master source for icon.png. Trademark-free: generic AC unit, airflow and
       snowflake (frost wash) shapes on a Hitachi-adjacent red. -->
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="0" y2="100">
      <stop offset="0" stop-color="#f41e40"/>
      <stop offset="1" stop-color="#c6001e"/>
    </linearGradient>
    <g id="arm" stroke="#ffffff" stroke-linecap="round" fill="none">
      <line x1="50" y1="69" x2="50" y2="82" stroke-width="2.47"/>
      <line x1="50" y1="76.15" x2="53.62" y2="78.69" stroke-width="2.08"/>
      <line x1="50" y1="76.15" x2="46.38" y2="78.69" stroke-width="2.08"/>
    </g>
  </defs>

  <!-- background -->
  <rect x="2" y="2" width="96" height="96" rx="22" fill="url(#bg)"/>

  <!-- wall-mounted indoor unit -->
  <rect x="20" y="24" width="60" height="20" rx="6.5" fill="#ffffff"/>
  <line x1="28" y1="38.5" x2="63" y2="38.5" stroke="#e60027" stroke-width="3.8" stroke-linecap="round"/>
  <circle cx="70.5" cy="38.5" r="1.7" fill="#e60027"/>

  <!-- airflow -->
  <line x1="28" y1="54" x2="23" y2="72" stroke="#ffffff" stroke-width="4.4" stroke-linecap="round"/>
  <line x1="72" y1="54" x2="77" y2="72" stroke="#ffffff" stroke-width="4.4" stroke-linecap="round"/>

  <!-- frost wash snowflake, six arms rotated about its center (50,69) -->
  <use href="#arm"/>
  <use href="#arm" transform="rotate(60 50 69)"/>
  <use href="#arm" transform="rotate(120 50 69)"/>
  <use href="#arm" transform="rotate(180 50 69)"/>
  <use href="#arm" transform="rotate(240 50 69)"/>
  <use href="#arm" transform="rotate(300 50 69)"/>
  <circle cx="50" cy="69" r="1.69" fill="#ffffff"/>
</svg>
